name: Build NoFocusLoss

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1.2.0

    - name: Restore NuGet packages
      run: nuget restore NoFocusLoss.sln

    - name: Build Solution (Release)
      run: msbuild NoFocusLoss.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Collect Binaries
      run: |
        mkdir build_output
        copy NoFocusLossGUI\bin\Release\NoFocusLossGUI.exe build_output\
        copy NoFocusLossGUI\bin\Release\NoFocusLoss.dll build_output\
        copy NoFocusLossGUI\bin\Release\NoFocusLoss64.dll build_output\
        dir /s /b SharpestInjector.dll > temp_path.txt
        set /p SHARPEST_PATH=<temp_path.txt
        copy "%SHARPEST_PATH%" build_output\
      shell: cmd

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NoFocusLoss-Release
        path: build_output/
